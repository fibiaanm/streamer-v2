; Upload limits
upload_max_filesize = 100M
post_max_size       = 100M

; Memory
memory_limit = 512M

; Execution
max_execution_time  = 60
max_input_time      = 60

; OPcache (development — disable in prod for hot reload)
opcache.enable            = 1
opcache.revalidate_freq   = 0
opcache.validate_timestamps = 1
