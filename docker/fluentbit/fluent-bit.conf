[SERVICE]
    Flush        2
    Daemon       Off
    Log_Level    info
    Parsers_File parsers.conf

[INPUT]
    Name              tail
    Path              /var/log/nginx/access.log
    Parser            nginx_json
    Tag               nginx.access
    Refresh_Interval  5
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On

[OUTPUT]
    Name            opensearch
    Match           nginx.*
    Host            opensearch
    Port            9200
    Index           streamerv2-nginx
    Logstash_Format On
    Logstash_Prefix streamerv2-nginx
    Logstash_DateFormat %Y.%m.%d
    Suppress_Type_Name On
