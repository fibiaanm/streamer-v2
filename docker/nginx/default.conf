log_format json_access escape=json
    '{'
        '"@timestamp":"$time_iso8601",'
        '"service":"nginx",'
        '"message":"$request_method $request_uri $status",'
        '"bytes_sent":$bytes_sent,'
        '"request_time":$request_time,'
        '"remote_addr":"$remote_addr",'
        '"http_user_agent":"$http_user_agent",'
        '"upstream_addr":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time"'
    '}';

server {
    listen 80;
    server_name _;

    access_log /var/log/nginx/access.log json_access;
    error_log  /var/log/nginx/error.log warn;

    root /var/www/html/public;
    index index.php;

    client_max_body_size 100M;

    # Socket.io service
    location /socket.io/ {
        access_log off;
        proxy_pass http://socketio:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Vite dev server — proxy assets and HMR websocket
    location ~ ^/(@|resources/js|resources/css|node_modules) {
        access_log off;
        proxy_pass http://vite:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # Serve static files directly; fall back to Laravel's index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Pass PHP requests to php-fpm
    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Deny access to hidden files
    location ~ /\.ht {
        deny all;
    }

    # Laravel health check (used by Docker healthcheck in later stages)
    location = /up {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        include fastcgi_params;
    }
}
