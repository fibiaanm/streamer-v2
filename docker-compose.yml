services:

  # ─── Laravel: nginx + php-fpm ─────────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    volumes:
      - ./backend:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "${APP_PORT:-8000}:80"
    depends_on:
      php:
        condition: service_healthy
    networks:
      - backend

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
      - ./backend:/var/www/html
    env_file: ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD", "php", "-v"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ─── Queue worker ──────────────────────────────────────────────────────────────
  queue:
    build:
      context: .
      dockerfile: docker/queue/Dockerfile
    volumes:
      - ./backend:/var/www/html
    env_file: ./backend/.env
    depends_on:
      php:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ─── Scheduler ────────────────────────────────────────────────────────────────
  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    volumes:
      - ./backend:/var/www/html
    env_file: ./backend/.env
    depends_on:
      php:
        condition: service_healthy
    networks:
      - backend
    restart: unless-stopped

  # ─── Vite dev server (HMR) ───────────────────────────────────────────────────
  vite:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./backend:/app
      - vite_node_modules:/app/node_modules
    ports:
      - "${VITE_PORT:-5173}:5173"
    command: sh -c "npm install && npm run dev"
    networks:
      - backend

  # ─── Socket.io (placeholder TypeScript — reemplazar en etapa 05) ──────────────
  socketio:
    build:
      context: .
      dockerfile: services/socketio/Dockerfile
    env_file: ./backend/.env
    ports:
      - "${SOCKETIO_PORT:-3000}:3000"
    depends_on:
      - redis
    networks:
      - backend
    restart: unless-stopped

  # ─── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${DB_DATABASE:-streamer}
      POSTGRES_USER: ${DB_USERNAME:-streamer}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-streamer} -d ${DB_DATABASE:-streamer}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ─── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ─── MinIO (S3 compatible) ────────────────────────────────────────────────────
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  minio-setup:
    image: minio/mc
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
      AWS_BUCKET: ${AWS_BUCKET:-streamer}
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
      /usr/bin/mc mb local/$$AWS_BUCKET --ignore-existing &&
      echo 'MinIO: bucket $$AWS_BUCKET listo.'
      "
    networks:
      - backend
    restart: "no"

  # ─── Mailpit (SMTP local) ─────────────────────────────────────────────────────
  mailpit:
    image: axllent/mailpit
    ports:
      - "${MAILPIT_UI_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    networks:
      - backend

  # ─── pgAdmin ──────────────────────────────────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@streamer.dev}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_LISTEN_PORT: "5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:5050"
    networks:
      - backend

  # ─── RedisInsight ─────────────────────────────────────────────────────────────
  redis-insight:
    image: redis/redisinsight
    ports:
      - "${REDIS_INSIGHT_PORT:-5540}:5540"
    networks:
      - backend

  # ─── MediaMTX (RTSP/RTMP/HLS/WebRTC) ─────────────────────────────────────────
  mediamtx:
    image: bluenviron/mediamtx
    ports:
      - "8554:8554"   # RTSP
      - "1935:1935"   # RTMP
      - "8888:8888"   # HLS
      - "8889:8889"   # WebRTC
    networks:
      - backend

  # ─── Meilisearch ──────────────────────────────────────────────────────────────
  meilisearch:
    image: getmeili/meilisearch:v1.8
    environment:
      MEILI_MASTER_KEY: ${MEILISEARCH_KEY:-localdevkey1234567890}
      MEILI_ENV: development
    volumes:
      - meilisearch_data:/meili_data
    ports:
      - "${MEILISEARCH_PORT:-7700}:7700"
    networks:
      - backend

  # ─── OpenSearch ───────────────────────────────────────────────────────────────
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - bootstrap.memory_lock=false
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    ports:
      - "${OPENSEARCH_PORT:-9200}:9200"
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    networks:
      - backend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9200/_cluster/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── OpenSearch Dashboards ────────────────────────────────────────────────────
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    environment:
      OPENSEARCH_HOSTS: http://opensearch:9200
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    ports:
      - "${OPENSEARCH_DASHBOARDS_PORT:-5601}:5601"
    depends_on:
      opensearch:
        condition: service_healthy
    networks:
      - backend

# ─── Networks ───────────────────────────────────────────────────────────────────
networks:
  backend:

# ─── Volumes ────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:
  minio_data:
  pgadmin_data:
  meilisearch_data:
  opensearch_data:
  vite_node_modules:
